<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sola GK Scoretracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8fafc; font-family: system-ui, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

    const COURSES = {
      forus:        { name: "Forus (Par 72)",        totalPar: 72, holes: [4,4,3,4,4,4,4,3,4,5,4,4,3,4,5,4,3,4] },
      solastranden: { name: "Solastranden (Par 69)", totalPar: 69, holes: [4,4,3,4,4,3,4,4,4,3,4,3,4,4,3,5,3,4] },
    };

    const ACHIEVEMENTS = [
      { id:"first_round",  icon:"golf",      title:"Forste runde",   desc:"Registrerte sin forste runde",                  check: r => r.length >= 1 },
      { id:"five_rounds",  icon:"star",      title:"5 runder",       desc:"Fullforte 5 runder",                            check: r => r.length >= 5 },
      { id:"ten_rounds",   icon:"ten",       title:"10 runder",      desc:"Fullforte 10 runder",                           check: r => r.length >= 10 },
      { id:"first_birdie", icon:"birdie",    title:"Forste birdie",  desc:"Slo sin forste birdie",                         check: r => r.some(rd => rd.scores.some((s,i) => s === COURSES[rd.course].holes[i] - 1)) },
      { id:"first_eagle",  icon:"eagle",     title:"Orn!",           desc:"Slo sin forste eagle",                          check: r => r.some(rd => rd.scores.some((s,i) => s <= COURSES[rd.course].holes[i] - 2)) },
      { id:"par_round",    icon:"target",    title:"Par-runde",      desc:"Fullforte en runde pa par eller bedre",         check: r => r.some(rd => rd.diff <= 0) },
      { id:"under_90",     icon:"nine",      title:"Under 90",       desc:"Slo under 90 slag pa Forus",                   check: r => r.some(rd => rd.course === "forus" && rd.total < 90) },
      { id:"under_80",     icon:"fire",      title:"Under 80",       desc:"Slo under 80 slag pa Forus",                   check: r => r.some(rd => rd.course === "forus" && rd.total < 80) },
      { id:"improving",    icon:"trending",  title:"Pa vei opp",     desc:"3 runder pa rad med lavere score enn forrige",  check: r => {
        if (r.length < 3) return false;
        const l = r.slice(-3);
        return l[1].total < l[0].total && l[2].total < l[1].total;
      }},
    ];

    const ICON_MAP = {
      golf: "Golf", star: "Stjerne", ten: "10", birdie: "Birdie", eagle: "Eagle",
      target: "Mal", nine: "Under 90", fire: "Under 80", trending: "Fremgang",
    };

    function fmtDate(d) {
      return new Date(d).toLocaleDateString("nb-NO", { day:"2-digit", month:"short", year:"2-digit" });
    }

    function calcHCP(rounds) {
      if (rounds.length < 3) return null;
      const use = rounds.slice(-20);
      const diffs = use.map(r => {
        const cr = r.course === "forus" ? 72.9 : 68.2;
        const sl = r.course === "forus" ? 144  : 126;
        return ((r.total - cr) * 113) / sl;
      });
      diffs.sort((a, b) => a - b);
      const n = use.length;
      const take = n<=6?1:n<=8?2:n<=11?3:n<=14?4:n<=16?5:n<=18?6:8;
      const avg = diffs.slice(0, take).reduce((a, b) => a + b, 0) / take;
      return (avg * 0.96).toFixed(1);
    }

    const diffLabel = d => d === 0 ? "E" : d > 0 ? "+" + d : "" + d;
    const diffColor = d => d < 0 ? "#16a34a" : d === 0 ? "#2563eb" : "#dc2626";

    function App() {
      const [view,       setView]       = useState("Ny runde");
      const [courseKey,  setCourseKey]  = useState("forus");
      const [scores,     setScores]     = useState(Array(18).fill(""));
      const [rounds,     setRounds]     = useState(() => {
        try { const s = localStorage.getItem("sola_gk_rounds"); return s ? JSON.parse(s) : []; }
        catch(e) { return []; }
      });
      const [savedMsg,   setSavedMsg]   = useState(false);
      const [notices,    setNotices]    = useState([]);
      const [statsHole,  setStatsHole]  = useState(null);

      useEffect(() => {
        try { localStorage.setItem("sola_gk_rounds", JSON.stringify(rounds)); } catch(e) {}
      }, [rounds]);

      const course       = COURSES[courseKey];
      const totalStrokes = scores.reduce((s, v) => s + (parseInt(v) || 0), 0);
      const diff         = totalStrokes - course.totalPar;
      const allFilled    = scores.every(v => parseInt(v) > 0);

      function setScore(i, val) {
        const n = parseInt(val);
        if (val === "" || (n >= 1 && n <= 15)) {
          const s = [...scores]; s[i] = val === "" ? "" : String(n); setScores(s);
        }
      }

      function saveRound() {
        const round = {
          id: Date.now(), date: new Date().toISOString(),
          course: courseKey, courseName: course.name,
          scores: scores.map(v => parseInt(v) || 0),
          total: totalStrokes, par: course.totalPar, diff,
        };
        const updated = [...rounds, round];
        const msgs = [];

        const prev = rounds.filter(r => r.course === courseKey);
        if (!prev.length) {
          msgs.push("Forste runde pa " + course.name + "!");
        } else if (totalStrokes < Math.min(...prev.map(r => r.total))) {
          msgs.push("Ny personlig rekord pa " + course.name + ": " + totalStrokes + " slag!");
        }

        const hRec = [];
        scores.forEach((s, i) => {
          const val = parseInt(s);
          const pb = rounds.filter(r => r.course === courseKey).map(r => r.scores[i]).filter(v => v > 0);
          if (pb.length && val < Math.min(...pb)) hRec.push("Hull " + (i + 1));
        });
        if (hRec.length) msgs.push("Ny rekord pa " + hRec.join(", ") + "!");

        const prevIds = ACHIEVEMENTS.filter(a => a.check(rounds)).map(a => a.id);
        ACHIEVEMENTS.filter(a => !prevIds.includes(a.id) && a.check(updated))
          .forEach(a => msgs.push("Achievement: " + a.title + "!"));

        setRounds(updated);
        setScores(Array(18).fill(""));
        if (msgs.length) { setNotices(msgs); setTimeout(() => setNotices([]), 5000); }
        setSavedMsg(true);
        setTimeout(() => setSavedMsg(false), 2500);
      }

      function deleteRound(id) {
        if (confirm("Slett denne runden?")) setRounds(prev => prev.filter(r => r.id !== id));
      }

      const hcp         = useMemo(() => calcHCP(rounds), [rounds]);
      const unlockedAch = useMemo(() => ACHIEVEMENTS.filter(a => a.check(rounds)), [rounds]);

      const worstHoles = useMemo(() => {
        if (!rounds.length) return [];
        return Array.from({ length: 18 }, (_, i) => {
          const vals = rounds.map(r => ({ score: r.scores[i], par: COURSES[r.course].holes[i] })).filter(v => v.score > 0);
          if (!vals.length) return { hole: i + 1, delta: 0 };
          const delta = vals.reduce((s, v) => s + (v.score - v.par), 0) / vals.length;
          return { hole: i + 1, delta: parseFloat(delta.toFixed(2)) };
        }).sort((a, b) => b.delta - a.delta);
      }, [rounds]);

      const totalChartData = rounds.map(r => ({ name: fmtDate(r.date), Slag: r.total, Par: r.par }));
      const holeChartData  = statsHole !== null
        ? rounds.filter(r => r.scores[statsHole] > 0).map(r => ({
            name: fmtDate(r.date),
            Slag: r.scores[statsHole],
            Par:  COURSES[r.course].holes[statsHole],
          }))
        : [];

      const holeStats = useMemo(() => {
        if (statsHole === null || !rounds.length) return null;
        const vals = rounds.map(r => r.scores[statsHole]).filter(v => v > 0);
        if (!vals.length) return null;
        return {
          avg:  (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1),
          best: Math.min(...vals),
          par:  COURSES[rounds[0].course].holes[statsHole],
        };
      }, [statsHole, rounds]);

      const overallStats = useMemo(() => {
        if (!rounds.length) return null;
        const d = rounds.map(r => r.diff);
        return {
          avg:   (d.reduce((a, b) => a + b, 0) / d.length).toFixed(1),
          best:  Math.min(...d),
          worst: Math.max(...d),
          count: rounds.length,
        };
      }, [rounds]);

      const W = ({ children, mb }) => (
        React.createElement("div", {
          style: { background:"#fff", borderRadius:12, padding:12, marginBottom: mb !== undefined ? mb : 14, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }
        }, children)
      );

      return (
        React.createElement("div", { style:{ maxWidth:520, margin:"0 auto", padding:"12px 16px", background:"#f8fafc", minHeight:"100vh" } },

          React.createElement("div", { style:{ textAlign:"center", marginBottom:14 } },
            React.createElement("div", { style:{ fontSize:22, fontWeight:700, color:"#15803d" } }, "Sola GK Scoretracker"),
            hcp !== null && React.createElement("div", { style:{ marginTop:4, fontSize:13, color:"#64748b" } },
              "Handicap-indeks: ",
              React.createElement("strong", { style:{ color:"#15803d", fontSize:16 } }, hcp)
            )
          ),

          notices.length > 0 && React.createElement("div", {
            style:{ background:"#fefce8", border:"1px solid #fde047", borderRadius:12, padding:12, marginBottom:14 }
          }, notices.map((n, i) =>
            React.createElement("div", { key:i, style:{ fontWeight:600, color:"#854d0e", fontSize:14, marginBottom: i < notices.length - 1 ? 4 : 0 } }, n)
          )),

          React.createElement("div", { style:{ display:"flex", gap:6, marginBottom:14 } },
            ["Ny runde","Statistikk","Achievements"].map(v =>
              React.createElement("button", {
                key: v, onClick: () => setView(v),
                style:{
                  flex:1, padding:"8px 0", borderRadius:8, border:"none", cursor:"pointer",
                  fontWeight:600, fontSize:13,
                  background: view === v ? "#15803d" : "#e2e8f0",
                  color:      view === v ? "#fff"     : "#374151",
                }
              }, v)
            )
          ),

          view === "Ny runde" && React.createElement("div", null,
            React.createElement("div", { style:{ display:"flex", gap:8, marginBottom:14 } },
              Object.entries(COURSES).map(([key, c]) =>
                React.createElement("button", {
                  key, onClick: () => { setCourseKey(key); setScores(Array(18).fill("")); },
                  style:{
                    flex:1, padding:"7px 0", borderRadius:8, border:"2px solid",
                    borderColor: courseKey === key ? "#15803d" : "#cbd5e1",
                    background:  courseKey === key ? "#dcfce7" : "#fff",
                    fontWeight:600, fontSize:13, cursor:"pointer", color:"#1e293b",
                  }
                }, c.name)
              )
            ),

            React.createElement(W, null,
              [0, 9].map(start =>
                React.createElement("div", { key: start },
                  start === 9 && React.createElement("div", { style:{ height:1, background:"#e2e8f0", margin:"8px 0" } }),
                  React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"repeat(9,1fr)", gap:4 } },
                    course.holes.slice(start, start + 9).map((par, j) => {
                      const i = start + j;
                      const val = parseInt(scores[i]);
                      const delta = val - par;
                      let bg = "#f1f5f9";
                      if (val) {
                        if      (delta <= -2) bg = "#fef08a";
                        else if (delta === -1) bg = "#bbf7d0";
                        else if (delta ===  0) bg = "#e0f2fe";
                        else if (delta ===  1) bg = "#fecaca";
                        else                   bg = "#f87171";
                      }
                      return React.createElement("div", { key: i, style:{ textAlign:"center" } },
                        React.createElement("div", { style:{ fontSize:9, color:"#64748b", fontWeight:600 } }, "H" + (i + 1)),
                        React.createElement("div", { style:{ fontSize:9, color:"#94a3b8" } }, "p" + par),
                        React.createElement("input", {
                          type:"number", min:"1", max:"15",
                          value: scores[i],
                          onChange: e => setScore(i, e.target.value),
                          style:{ width:"100%", textAlign:"center", padding:"4px 0", borderRadius:6, border:"1px solid #e2e8f0", background:bg, fontWeight:700, fontSize:15 }
                        })
                      );
                    })
                  )
                )
              )
            ),

            React.createElement("div", { style:{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12, fontSize:11 } },
              [["#fef08a","Eagle-"],["#bbf7d0","Birdie"],["#e0f2fe","Par"],["#fecaca","Bogey"],["#f87171","2+ over"]].map(([c, l]) =>
                React.createElement("span", { key:l, style:{ background:c, padding:"2px 8px", borderRadius:10, color:"#374151", fontWeight:500 } }, l)
              )
            ),

            totalStrokes > 0 && React.createElement("div", {
              style:{ background:"#fff", borderRadius:10, padding:"10px 14px", marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }
            },
              React.createElement("span", { style:{ fontWeight:600, color:"#374151" } },
                "Total: ", React.createElement("strong", { style:{ fontSize:20 } }, totalStrokes)
              ),
              React.createElement("span", { style:{ fontWeight:700, fontSize:18, color: diffColor(diff) } }, diffLabel(diff))
            ),

            React.createElement("button", {
              onClick: saveRound, disabled: !allFilled,
              style:{
                width:"100%", padding:"12px 0", borderRadius:10, border:"none",
                background: allFilled ? "#15803d" : "#e2e8f0",
                color:      allFilled ? "#fff"    : "#94a3b8",
                fontWeight:700, fontSize:15, cursor: allFilled ? "pointer" : "default",
              }
            }, savedMsg ? "Lagret!" : "Lagre runde")
          ),

          view === "Statistikk" && React.createElement("div", null,
            !rounds.length
              ? React.createElement("div", { style:{ textAlign:"center", color:"#64748b", marginTop:40 } }, "Ingen runder lagret enna.")
              : React.createElement("div", null,

                  React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:14 } },
                    [
                      ["Runder", overallStats.count,                                              "#2563eb"],
                      ["Snitt",  Number(overallStats.avg) > 0 ? "+" + overallStats.avg : overallStats.avg, "#d97706"],
                      ["Best",   diffLabel(overallStats.best),                                    "#16a34a"],
                      ["HCP",    hcp !== null ? hcp : "-",                                        "#7c3aed"],
                    ].map(([lbl, val, col]) =>
                      React.createElement("div", { key:lbl, style:{ background:"#fff", borderRadius:10, padding:"10px 6px", textAlign:"center", boxShadow:"0 1px 3px rgba(0,0,0,0.06)" } },
                        React.createElement("div", { style:{ fontSize:11, color:"#64748b", fontWeight:600 } }, lbl),
                        React.createElement("div", { style:{ fontSize:17, fontWeight:800, color:col } }, val)
                      )
                    )
                  ),

                  hcp === null && React.createElement("div", { style:{ fontSize:12, color:"#94a3b8", marginBottom:12, textAlign:"center" } }, "Trenger minst 3 runder for handicap-beregning"),

                  React.createElement(W, null,
                    React.createElement("div", { style:{ fontWeight:700, color:"#374151", marginBottom:8 } }, "Totalt antall slag per runde"),
                    React.createElement(ResponsiveContainer, { width:"100%", height:180 },
                      React.createElement(LineChart, { data: totalChartData, margin:{ left:-10, right:8 } },
                        React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#f1f5f9" }),
                        React.createElement(XAxis, { dataKey:"name", tick:{ fontSize:11 } }),
                        React.createElement(YAxis, { tick:{ fontSize:11 }, domain:["auto","auto"] }),
                        React.createElement(Tooltip),
                        React.createElement(Line, { type:"monotone", dataKey:"Slag", stroke:"#15803d", strokeWidth:2, dot:{ r:4 } }),
                        React.createElement(Line, { type:"monotone", dataKey:"Par",  stroke:"#94a3b8", strokeDasharray:"4 4", strokeWidth:1.5, dot:false })
                      )
                    )
                  ),

                  React.createElement(W, null,
                    React.createElement("div", { style:{ fontWeight:700, color:"#374151", marginBottom:4 } }, "Verstinghull"),
                    React.createElement("div", { style:{ fontSize:12, color:"#94a3b8", marginBottom:10 } }, "Topp 5 hull med hoyest snitt over par"),
                    worstHoles.slice(0, 5).map(h =>
                      React.createElement("div", { key: h.hole, style:{ display:"flex", alignItems:"center", gap:8, marginBottom:8 } },
                        React.createElement("div", { style:{ width:44, fontWeight:700, fontSize:13, color:"#374151" } }, "Hull " + h.hole),
                        React.createElement("div", { style:{ flex:1, background:"#f1f5f9", borderRadius:6, height:18, overflow:"hidden" } },
                          React.createElement("div", { style:{ width: Math.min(100,(h.delta/3)*100) + "%", background: h.delta>1?"#ef4444":h.delta>0.5?"#f97316":"#fbbf24", height:"100%", borderRadius:6, minWidth:4 } })
                        ),
                        React.createElement("div", { style:{ width:60, textAlign:"right", fontSize:13, color: h.delta > 0 ? "#dc2626" : "#16a34a", fontWeight:700 } },
                          (h.delta > 0 ? "+" : "") + h.delta
                        )
                      )
                    )
                  ),

                  React.createElement(W, null,
                    React.createElement("div", { style:{ fontWeight:700, color:"#374151", marginBottom:10 } }, "Graf per hull"),
                    React.createElement("div", { style:{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 } },
                      Array.from({ length:18 }, (_, i) =>
                        React.createElement("button", {
                          key: i, onClick: () => setStatsHole(statsHole === i ? null : i),
                          style:{
                            padding:"4px 10px", borderRadius:20, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
                            background: statsHole === i ? "#15803d" : "#e2e8f0",
                            color:      statsHole === i ? "#fff"    : "#374151",
                          }
                        }, "H" + (i + 1))
                      )
                    ),
                    statsHole !== null && holeChartData.length > 0 && React.createElement("div", null,
                      holeStats && React.createElement("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 } },
                        [["Snitt", holeStats.avg],["Best", holeStats.best],["Par", holeStats.par]].map(([l, v]) =>
                          React.createElement("div", { key:l, style:{ textAlign:"center", background:"#f8fafc", borderRadius:8, padding:"6px 4px" } },
                            React.createElement("div", { style:{ fontSize:11, color:"#64748b" } }, l),
                            React.createElement("div", { style:{ fontWeight:700, fontSize:16 } }, v)
                          )
                        )
                      ),
                      React.createElement(ResponsiveContainer, { width:"100%", height:160 },
                        React.createElement(LineChart, { data: holeChartData, margin:{ left:-10, right:8 } },
                          React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#f1f5f9" }),
                          React.createElement(XAxis, { dataKey:"name", tick:{ fontSize:11 } }),
                          React.createElement(YAxis, { tick:{ fontSize:11 }, domain:["auto","auto"] }),
                          React.createElement(Tooltip),
                          holeStats && React.createElement(ReferenceLine, { y: holeStats.par, stroke:"#94a3b8", strokeDasharray:"4 4", label:{ value:"Par", position:"insideTopRight", fontSize:10 } }),
                          React.createElement(Line, { type:"monotone", dataKey:"Slag", stroke:"#2563eb", strokeWidth:2, dot:{ r:4 } })
                        )
                      )
                    ),
                    statsHole !== null && !holeChartData.length && React.createElement("div", { style:{ color:"#94a3b8", fontSize:13, textAlign:"center", padding:12 } }, "Ingen data enna."),
                    statsHole === null && React.createElement("div", { style:{ color:"#94a3b8", fontSize:13, textAlign:"center", padding:8 } }, "Trykk pa et hull for a se grafen.")
                  ),

                  React.createElement(W, { mb: 0 },
                    React.createElement("div", { style:{ fontWeight:700, color:"#374151", marginBottom:8 } }, "Rundehistorikk"),
                    [...rounds].reverse().map(r =>
                      React.createElement("div", { key: r.id, style:{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #f1f5f9" } },
                        React.createElement("div", null,
                          React.createElement("span", { style:{ fontWeight:600, fontSize:13 } }, fmtDate(r.date)),
                          React.createElement("span", { style:{ fontSize:11, color:"#94a3b8", marginLeft:6 } }, r.courseName)
                        ),
                        React.createElement("div", { style:{ display:"flex", gap:10, alignItems:"center" } },
                          React.createElement("span", { style:{ fontWeight:700, fontSize:15 } }, r.total),
                          React.createElement("span", { style:{ fontWeight:700, fontSize:13, color: diffColor(r.diff) } }, diffLabel(r.diff)),
                          React.createElement("button", { onClick: () => deleteRound(r.id), style:{ background:"none", border:"none", cursor:"pointer", color:"#cbd5e1", fontSize:18, padding:0, lineHeight:1 } }, "x")
                        )
                      )
                    )
                  )
                )
          ),

          view === "Achievements" && React.createElement("div", null,
            React.createElement("div", { style:{ fontSize:13, color:"#64748b", marginBottom:14, textAlign:"center" } },
              unlockedAch.length + " av " + ACHIEVEMENTS.length + " achievements last opp"
            ),
            React.createElement("div", { style:{ background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" } },
              ACHIEVEMENTS.map((a, i) => {
                const ok = a.check(rounds);
                return React.createElement("div", {
                  key: a.id,
                  style:{
                    display:"flex", alignItems:"center", gap:14, padding:"14px 16px",
                    borderBottom: i < ACHIEVEMENTS.length - 1 ? "1px solid #f1f5f9" : "none",
                    opacity: ok ? 1 : 0.4,
                    background: ok ? "#fff" : "#f8fafc",
                  }
                },
                  React.createElement("div", { style:{ width:36, textAlign:"center", fontSize:13, fontWeight:700, color:"#15803d" } }, ok ? ICON_MAP[a.icon] : "?"),
                  React.createElement("div", null,
                    React.createElement("div", { style:{ fontWeight:700, fontSize:14, color: ok ? "#1e293b" : "#94a3b8" } }, a.title),
                    React.createElement("div", { style:{ fontSize:12, color:"#94a3b8", marginTop:2 } }, a.desc)
                  ),
                  ok && React.createElement("div", { style:{ marginLeft:"auto", color:"#16a34a", fontSize:18 } }, "ok")
                );
              })
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
